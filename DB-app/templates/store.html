<!DOCTYPE html>
<html>
<head>
    <title>Stores - GreenGrocer Online</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div id="nav">
        <header>
            <h1>GreenGrocer Online - Stores</h1>
        </header>
        <div class="nav-links">
            <a href="/">Home</a>
        </div>
    </div>

    <div class="table-actions">
        <a class="add" href="/add_stores">Add Store</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Store ID</th>
                <th>Street Address</th>
                <th>City</th>
                <th>State</th>
                <th>Zip</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        {% for data in stores %}
            <tr>
                <td>{{ data.store_id }}</td>
                <td>{{ data.street_address }}</td>
                <td>{{ data.city }}</td>
                <td>{{ data.state }}</td>
                <td>{{ data.zip }}</td>
                <td><a href="/delete_store/{{ data.store_id }}" class="delete">Delete</a></td>
            </tr>
        {% else %}
            <tr>
                <td colspan="6">No stores available.</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</body>
</html>
