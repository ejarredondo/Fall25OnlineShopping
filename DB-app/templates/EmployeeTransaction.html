<!DOCTYPE html>
<html>
<head>
    <title>Employee Transaction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div id="nav">
        <header>
            <h1>GreenGrocer Online - Employee Transactions</h1>
        </header>
        <div class="nav-links">
            <a href="/">Home</a>
        </div>
    </div>

    <div class="table-actions">
        <a class="add" href="/add_employeetransactions">Add Employee Transaction</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Employee ID</th>
                <th>Transaction ID</th>
                <th>Store ID</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        {% for data in employeetransactions %}
            <tr>
                <td>{{ data.employee_id }}</td>
                <td>{{ data.transaction_id }}</td>
                <td>{{ data.store_id }}</td>
                <td><a href="/delete_employeetransactions/{{ data.employee_id }}/{{ data.transaction_id }}/delete" class="delete">Delete</a></td>
            </tr>
        {% else %}
            <tr>
                <td colspan="4">No employee transactions available.</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</body>
</html>
