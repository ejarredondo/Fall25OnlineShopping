<!DOCTYPE html>
<html>
<head>
    <title>Customers - GreenGrocer Online</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="nav">
        <header>
            <h1>GreenGrocer Online - Customers</h1>
        </header>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="tables.html">Tables List</a>
            <a href="add_tables.html">Add to Tables</a>
        </div>
    </div>

    <div class="table-actions">
        <a class="add" href="/add_customer">Add Customer</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Customer ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        {% for data in customers %}
            <tr>
                <td>{{ data.customer_id }}</td>
                <td>{{ data.first_name }}</td>
                <td>{{ data.last_name }}</td>
                <td><a href="/customers/{{ data.customer_id }}/delete" class="delete">Delete</a></td>
            </tr>
        {% else %}
            <tr>
                <td colspan="4">No customers available.</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</body>
</html>
