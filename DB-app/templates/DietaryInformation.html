<!DOCTYPE html>
<html>
<head>
    <title>Dietary Information - GreenGrocer Online</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div id="nav">
        <header>
            <h1>GreenGrocer Online - Dietary Information</h1>
        </header>
        <div class="nav-links">
            <a href="/">Home</a>
        </div>
    </div> 

    <div class="table-actions">
        <a class="add" href="/add_DietaryInformation">Add Dietary Information</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Product ID</th>
                <th>Restriction</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        {% for data in dietary_informations %}
            <tr>
                <td>{{ data.product_id }}</td>
                <td>{{ data.restriction }}</td>
                <td><a href="/delete_DietaryInformation/{{ data.product_id }}" class="delete">Delete</a></td>
            </tr>
        {% else %}
            <tr>
                <td colspan="3">No dietary information available.</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</body>
</html>
